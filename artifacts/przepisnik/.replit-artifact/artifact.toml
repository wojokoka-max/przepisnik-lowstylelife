kind = "web"
previewPath = "/"
title = "Przepiśnik LowStyleLife"
version = "1.0.0"
id = "artifacts/przepisnik"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20209

[services.development]
run = "pnpm --filter @workspace/przepisnik run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/przepisnik", "run", "build" ]
publicDir = "artifacts/przepisnik/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20209"
BASE_PATH = "/"
